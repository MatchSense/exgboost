name: precompile

on:
  - push
  - workflow_dispatch

jobs:
  linux:
    name: Linux Erlang/OTP ${{matrix.otp}} / Elixir ${{matrix.elixir}}
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: "prod"
      CC: gcc-14
      CXX: g++-14
    strategy:
      matrix:
        include:
          - otp: "28.3"
            elixir: "1.18.4"
          - otp: "28.3"
            elixir: "1.19.5"
          - otp: "29.0.2"
            elixir: "1.20.2"
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake autoconf pkg-config bc m4 unzip zip \
            cmake ninja-build gcc-14 g++-14 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-riscv64-linux-gnu g++-riscv64-linux-gnu
      - name: Mix Test
        run: |
          mix deps.get
          MIX_ENV=test mix test
      - name: Create precompiled library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          mix elixir_make.precompile
      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cache/*.tar.gz

  macos:
    runs-on: ${{matrix.runner}}
    # Homebrew supports versioned Erlang/OTP but not Elixir
    # It's a deliberate design decision from Homebrew to
    # only support versioned distributions for certain packages
    name: Mac (ARM) Erlang/OTP ${{matrix.otp}} / Elixir
    env:
      MIX_ENV: "prod"
    strategy:
      matrix:
        runner: ["macos-15"]
        otp: ["27.0", "28.0"]
        elixir: ["1.18.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: asdf-vm/actions/setup@v3
      - uses: asdf-vm/actions/install@v3
        with:
          tool_versions: |
            erlang ${{matrix.otp}}
            elixir ${{matrix.elixir}}
      - name: Install libomp
        run: |
          brew install libomp
          mix local.hex --force
          mix local.rebar --force
      - name: Mix Test
        run: |
          mix deps.get
          MIX_ENV=test mix test
      - name: Create precompiled library
        run: |
          export ELIXIR_MAKE_CACHE_DIR=$(pwd)/cache
          mkdir -p "${ELIXIR_MAKE_CACHE_DIR}"
          mix elixir_make.precompile
      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ 'cache/*aarch64*.tar.gz' }}
